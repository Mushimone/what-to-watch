
<mat-form-field>
  <mat-label>Search for movies or TV shows</mat-label>
  <input matInput [formControl]="searchControl" placeholder="Type a title" [matAutocomplete]="auto" />
  <mat-autocomplete #auto="matAutocomplete" [displayWith]="displayWith" (optionSelected)="onResultSelected($event)">
    @if (searchResults$ | async; as results) {
      @for (result of $any(results); track result.external_id) {
        <mat-option [value]="result">
          <div class="result-option">
            @if (result.poster_url) {
              <img [src]="result.poster_url" class="result-poster" alt="" />
            }
            <div class="result-info">
              <span class="result-title">{{ result.title }}</span>
              <span class="result-meta">{{ result.type }} · {{ result.genres.slice(0, 2).join(', ') }}</span>
            </div>
          </div>
        </mat-option>
      }
    }
  </mat-autocomplete>
</mat-form-field>
