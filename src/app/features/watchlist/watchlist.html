<div class="watchlist-page">
  <mat-tab-group (selectedTabChange)="onTabChange($event)">
    <mat-tab label="Watchlist">
      <app-watchlist-list></app-watchlist-list>
    </mat-tab>
    <mat-tab label="Add">
      <app-watchlist-add></app-watchlist-add>
    </mat-tab>
  </mat-tab-group>

  <!-- FAB + chat panel — outside tab group so it floats over everything -->
  <app-watchlist-ai-chat [mode]="chatMode"></app-watchlist-ai-chat>
</div>
