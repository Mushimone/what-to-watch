<div class="login-page">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="login-logo"></div>
      <h1>What to Watch</h1>
    </mat-card-header>

    <mat-card-subtitle>
      Your personal watchlist for movies, series and anime
    </mat-card-subtitle>

    <mat-card-content>
      <button mat-raised-button class="google-btn" (click)="loginWithGoogle()">
        <span class="google-icon">G</span>
        Continue with Google
      </button>
    </mat-card-content>
  </mat-card>

  <p class="login-footer">By signing in you agree to our terms of service (there are none)</p>
</div>
